<script>
const STEPS=[
  {chapter:"Origin",heading:"Fleece selection, Atlas Mountains",caption:"Master craftsman Hassan Idrissi begins each commission at the highland farms above Midelt, selecting wool by hand — evaluating staple length, crimp, and lanolin content. Only 30% of fleeces pass his standard.",note:"The wool from these elevations has a memory that synthetic fibers cannot replicate. It wants to hold its knot.",date:"March 4, 2024",pal:["#3D2B1F","#7A5C3E","#C9A96E","#F5EDD6"]},
  {chapter:"Origin",heading:"Natural dyeing, madder vat",caption:"Raw fleece enters the madder vat — a 400-year-old copper cauldron still in use at the Idrissi workshop. Pomegranate rind and alum mordant fix the base tone before overdyeing begins.",note:"The first bath is always the most honest. Everything after is conversation.",date:"March 11, 2024",pal:["#7A1C1C","#B5432A","#E8956A","#F7D9C4"]},
  {chapter:"Origin",heading:"Dye sampling, palette confirmed",caption:"Twelve sample skeins against the approved design board. The dusty sage, antique rose, and deep indigo are approved. The client's designer signs off via video review with Tapis Décor.",note:"Your three primary colors are now set. We can begin warping the loom.",date:"March 19, 2024",pal:["#3A5740","#7B9E87","#C9D4BE","#F0EDE4"]},
  {chapter:"Foundation",heading:"Loom construction, warp set",caption:"A traditional upright loom is built to the commission's exact dimensions — 9 ft 4 in wide to allow for draw-in. Cotton warp threads are tensioned at 180 per linear foot.",note:"The loom is the skeleton. Everything that follows lives or dies by the tension we set today.",date:"April 2, 2024",pal:["#2C2C2A","#888780","#C9A96E","#F5F0E8"]},
  {chapter:"Foundation",heading:"Knot counting begins",caption:"The pattern cartoon is hung behind the loom. Weavers work in pairs — one reading knot codes aloud while the second ties. At 200 knots per square inch, this rug will contain approximately 2.6 million individual knots.",note:"At this density the pile will stand 8mm — the depth that gives the garden motif its dimensional shadow.",date:"April 14, 2024",pal:["#1C2A3A","#3D6080","#8FBAD4","#E0EEF7"]},
  {chapter:"Weaving",heading:"Field ground established",caption:"The ivory field ground is laid first, covering approximately 40% of the total area. This foundational layer must be flawless — any irregularity in tension will telegraph upward into the motif.",note:"We are moving at 2 inches per day. The field is meditative work — it reveals the weaver's character.",date:"May 8, 2024",pal:["#B09060","#D4BF9A","#EDE3D0","#FAF7F0"]},
  {chapter:"Weaving",heading:"Central medallion emerges",caption:"The eight-pointed star medallion enters the loom. Each geometric repeat requires 14 distinct yarn colors shifted in sequence. Two master weavers are assigned exclusively to this section.",note:"A medallion is a conversation between geometry and touch. You feel the math before you see it.",date:"June 3, 2024",pal:["#3A2060","#7A5BB0","#C4A8E8","#EEE4F8"]},
  {chapter:"Weaving",heading:"Border scroll, halfway point",caption:"The classical acanthus border reaches the halfway mark. Inspection confirms consistent 220 KPSI throughout — a benchmark rarely achieved on commissions of this scale.",note:"We shaved 3mm on the outer guard stripe — it makes the field breathe better. You will feel the change before you see it.",date:"July 22, 2024",pal:["#2A4020","#5A8040","#9DC070","#D8EDBD"]},
  {chapter:"Finishing",heading:"Loom off, first stretching",caption:"After 19 weeks on the loom, the rug is removed and laid flat on the workshop floor for the first time. Natural wool elasticity causes a 2% reduction in both dimensions — precisely anticipated in the original draft.",note:"This is always the morning I wait for. The rug becomes itself the moment it leaves the loom.",date:"August 30, 2024",pal:["#4A3820","#8A6840","#C09860","#E8D8B0"]},
  {chapter:"Finishing",heading:"Hand washing, drying court",caption:"The rug is washed in the workshop courtyard using cold mountain water and a mild plant-soap solution. It is laid pile-down to dry in dappled light — direct sun would bleach the natural dyes.",note:"The washing reveals the true depth of color. Every commission surprises us at this stage.",date:"September 6, 2024",pal:["#1C3A4A","#3A7090","#7AB8D4","#CCE8F4"]},
  {chapter:"Finishing",heading:"Carving and pile shaping",caption:"A master carver uses small curved scissors to sculpt the relief between motifs — opening the medallion petals and crisp-edging the border scrolls. This is the detail that distinguishes the commission from production work.",note:"The carving takes longer than most clients expect. But it is where the rug learns to cast shadow.",date:"September 18, 2024",pal:["#3A2820","#706050","#A89878","#E0D4BC"]},
  {chapter:"Delivery",heading:"Final inspection and certificate",caption:"Hassan Idrissi signs the certificate of authenticity. The rug is wrapped in unbleached muslin, rolled on an acid-free tube, and prepared for white-glove delivery. Your charm code is registered permanently.",note:"This is the only rug in the world with this exact knot sequence. It is entirely yours.",date:"October 10, 2024",pal:["#1C1A16","#9A7B4F","#C9A96E","#F5F0E8"]},
];

const CHAPTERS=[...new Set(STEPS.map(s=>s.chapter))];
let cur=0;
let lbOpen=false;

function drawRug(ctx,W,H,idx,small=false){
  const s=STEPS[idx];
  const [c1,c2,c3,c4]=s.pal;
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle=c1; ctx.fillRect(0,0,W,H);
  ctx.save(); ctx.globalAlpha=0.15; ctx.strokeStyle=c4; ctx.lineWidth=small?0.6:0.9;
  const sp=small?14:22;
  for(let x=0;x<W+sp;x+=sp) for(let y=0;y<H+sp;y+=sp){
    ctx.beginPath(); ctx.moveTo(x,y-sp/2); ctx.lineTo(x+sp/2,y); ctx.lineTo(x,y+sp/2); ctx.lineTo(x-sp/2,y); ctx.closePath(); ctx.stroke();
  }
  ctx.restore();
  const cx=W/2,cy=H/2;
  const r1=Math.min(W,H)*0.33,r2=r1*0.6,r3=r1*0.28;
  ctx.save(); ctx.globalAlpha=0.12; ctx.strokeStyle=c3; ctx.lineWidth=1;
  ctx.beginPath(); ctx.arc(cx,cy,r1,0,Math.PI*2); ctx.stroke();
  ctx.restore();
  ctx.save(); ctx.globalAlpha=0.2;
  for(let i=0;i<8;i++){
    const a=(i/8)*Math.PI*2-Math.PI/8;
    const x1=cx+Math.cos(a)*r1,y1=cy+Math.sin(a)*r1;
    const x2=cx+Math.cos(a+Math.PI/8)*r2,y2=cy+Math.sin(a+Math.PI/8)*r2;
    ctx.strokeStyle=c3; ctx.lineWidth=0.8;
    ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
  }
  ctx.restore();
  ctx.save(); ctx.globalAlpha=0.3; ctx.fillStyle=c3;
  ctx.beginPath();
  for(let i=0;i<8;i++){
    const a=(i/8)*Math.PI*2-Math.PI/8;
    const x1=cx+Math.cos(a)*r3,y1=cy+Math.sin(a)*r3;
    if(i===0)ctx.moveTo(x1,y1); else ctx.lineTo(x1,y1);
  }
  ctx.closePath(); ctx.fill();
  ctx.restore();
  if(!small){
    ctx.save();
    ctx.font='700 64px serif'; ctx.fillStyle=c4; ctx.globalAlpha=0.07;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(String(idx+1).padStart(2,'0'),cx,cy+3);
    ctx.restore();
    ctx.save();
    const g=ctx.createLinearGradient(0,H-50,0,H);
    g.addColorStop(0,'rgba(0,0,0,0)'); g.addColorStop(1,'rgba(0,0,0,0.45)');
    ctx.fillStyle=g; ctx.fillRect(0,H-50,W,50);
    ctx.restore();
  }
}

function goTo(idx){
  cur=Math.max(0,Math.min(STEPS.length-1,idx));
  const s=STEPS[cur];
  const hc=document.getElementById('heroCanvas');
  drawRug(hc.getContext('2d'),hc.width,hc.height,cur);
  document.getElementById('heroBadge').textContent='Step '+String(cur+1).padStart(2,'0');
  document.getElementById('annCh').textContent=s.chapter;
  document.getElementById('annTitle').textContent=s.heading;
  document.getElementById('annCap').textContent=s.caption;
  document.getElementById('annNote').textContent=s.note;
  document.getElementById('annDate').textContent=s.date;
  const pct=cur/(STEPS.length-1)*100;
  document.getElementById('progFill').style.width=pct+'%';
  document.getElementById('progThumb').style.left=pct+'%';
  document.getElementById('progCount').textContent=(cur+1)+' / '+STEPS.length;
  document.querySelectorAll('.ch-pill').forEach(b=>b.classList.toggle('active',b.dataset.ch===s.chapter));
  document.querySelectorAll('.thumb').forEach((t,i)=>t.classList.toggle('active',i===cur));
  const actThumb=document.querySelector('.thumb.active');
  if(actThumb)actThumb.scrollIntoView({behavior:'smooth',inline:'center',block:'nearest'});
  document.getElementById('btnPrev').disabled=cur===0;
  document.getElementById('btnNext').disabled=cur===STEPS.length-1;
  if(lbOpen)updateLightbox();
}

function openLightbox(){
  lbOpen=true;
  const lb=document.getElementById('lightbox');
  lb.classList.add('open');
  updateLightbox();
  lb.scrollIntoView({behavior:'smooth',block:'start'});
}

function closeLightbox(){
  lbOpen=false;
  document.getElementById('lightbox').classList.remove('open');
}

function updateLightbox(){
  const s=STEPS[cur];
  const lbc=document.getElementById('lbCanvas');
  drawRug(lbc.getContext('2d'),lbc.width,lbc.height,cur);
  document.getElementById('lbStep').textContent='Step '+String(cur+1).padStart(2,'0')+' · '+STEPS.length;
  document.getElementById('lbTitle').textContent=s.heading;
  document.getElementById('lbCap').textContent=s.caption;
  const dotsEl=document.getElementById('lbDots');
  dotsEl.innerHTML='';
  const start=Math.max(0,Math.min(cur-3,STEPS.length-7));
  const end=Math.min(start+6,STEPS.length-1);
  for(let i=start;i<=end;i++){
    const d=document.createElement('div');
    d.className='lb-dot'+(i===cur?' active':'');
    d.onclick=(()=>{const ii=i;return()=>{goTo(ii);}})();
    dotsEl.appendChild(d);
  }
}

document.getElementById('expandBtn').onclick=openLightbox;
document.getElementById('lbClose').onclick=closeLightbox;
document.getElementById('lbPrev').onclick=()=>{goTo(cur-1);};
document.getElementById('lbNext').onclick=()=>{goTo(cur+1);};
document.getElementById('btnPrev').onclick=()=>goTo(cur-1);
document.getElementById('btnNext').onclick=()=>goTo(cur+1);

document.getElementById('progRail').addEventListener('click',e=>{
  const r=e.currentTarget.getBoundingClientRect();
  goTo(Math.round((e.clientX-r.left)/r.width*(STEPS.length-1)));
});

let touchX=null;
const heroEl=document.getElementById('heroCanvas');
heroEl.addEventListener('touchstart',e=>{touchX=e.touches[0].clientX;},{passive:true});
heroEl.addEventListener('touchend',e=>{
  if(touchX===null)return;
  const dx=e.changedTouches[0].clientX-touchX;
  if(Math.abs(dx)>30) goTo(dx<0?cur+1:cur-1);
  touchX=null;
},{passive:true});

const lbEl=document.getElementById('lbCanvas');
lbEl.addEventListener('touchstart',e=>{touchX=e.touches[0].clientX;},{passive:true});
lbEl.addEventListener('touchend',e=>{
  if(touchX===null)return;
  const dx=e.changedTouches[0].clientX-touchX;
  if(Math.abs(dx)>30) goTo(dx<0?cur+1:cur-1);
  touchX=null;
},{passive:true});

const nav=document.getElementById('chapterScroll');
CHAPTERS.forEach(ch=>{
  const b=document.createElement('button');
  b.className='ch-pill'; b.textContent=ch; b.dataset.ch=ch;
  b.onclick=()=>{const f=STEPS.findIndex(s=>s.chapter===ch);if(f>=0)goTo(f);};
  nav.appendChild(b);
});

const strip=document.getElementById('filmstrip');
STEPS.forEach((s,i)=>{
  const d=document.createElement('div'); d.className='thumb';
  const c=document.createElement('canvas'); c.width=104; c.height=84;
  drawRug(c.getContext('2d'),104,84,i,true);
  const n=document.createElement('div'); n.className='thumb-n'; n.textContent=String(i+1).padStart(2,'0');
  d.appendChild(c); d.appendChild(n); d.title=s.heading;
  d.onclick=()=>goTo(i); strip.appendChild(d);
});

goTo(0);
</script>
